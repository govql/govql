# The four app services (scraper, ingester, server, nginx) carry BOTH an
# `image:` reference and a `build:` section from one compose file. Production
# sets IMAGE_TAG to a commit SHA and pulls the prebuilt GHCR image; local dev
# builds from source (`docker compose ... up --build`), where IMAGE_TAG
# defaults to `latest`. Images are built and pushed to GHCR by
# .github/workflows/us-congress.yml on merge to main.
services:
  scraper:
    image: ghcr.io/govql/us-congress-scraper:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./scraper/Dockerfile
    restart: always
    environment:
      # DATABASE_URL: the scraper advances each source's `fetch` cursor in
      # source_state after a successful scrape (the fetch→load handshake).
      - DATABASE_URL
      - HEALTHCHECK_VOTES_SCRAPE_URL
    volumes:
      - scraped-data:/congress
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:18-alpine
    restart: always
    # Tuned for a 1 GB host. Key changes from defaults:
    #   shared_buffers      64 MB  (default 128 MB) — main query cache
    #   effective_cache_size 256 MB — planner hint for OS page cache available
    #   work_mem             2 MB  (default 4 MB)  — per-sort/hash allocation
    #   maintenance_work_mem 32 MB (default 64 MB) — VACUUM / CREATE INDEX
    #   max_connections      25    (default 100)   — server pool 10 + ingester 5
    #                                                 + 3 reserved + headroom
    #   wal_buffers          4 MB  — explicit (auto would be ~2 MB here)
    #   checkpoint_completion_target 0.9 — spread writes, reduce I/O spikes
    #   random_page_cost     1.1   — SSD: favour index scans over seq scans
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=256MB
        -c work_mem=2MB
        -c maintenance_work_mem=32MB
        -c max_connections=25
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - GRAFANA_READER_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql
      # Only service-account roles run at initdb (fresh volume only). The schema
      # itself is owned by Flyway — see the `flyway` service below.
      - ./db/roles:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # One-shot schema migrator. Runs `flyway migrate` on every `up` — applies any
  # pending db/migrations/V*.sql then exits (idempotent: a no-op when nothing is
  # pending). The server waits for it to finish (see server.depends_on) so
  # PostGraphile always introspects the migrated schema. Pinned to a specific
  # version for reproducible deploys; bump deliberately.
  flyway:
    image: flyway/flyway:12.9.0-alpine
    command: migrate
    restart: 'no'   # never restart a run-to-completion job
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - FLYWAY_USER=${POSTGRES_USER}
      - FLYWAY_PASSWORD=${POSTGRES_PASSWORD}
      - FLYWAY_DEFAULT_SCHEMA=public
      - FLYWAY_LOCATIONS=filesystem:/flyway/sql
    volumes:
      - ./db/migrations:/flyway/sql:ro
    deploy:
      resources:
        limits:
          # Transient JVM job; generous cap so a migration is never OOM-killed.
          memory: 256M

  redis:
    image: redis:8-alpine
    restart: always
    # Cap in-memory data at 32 MB; evict least-recently-used keys when full.
    # Rate-limiting counters are ephemeral so LRU eviction is safe here.
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 48M

  ingester:
    image: ghcr.io/govql/us-congress-ingester:${IMAGE_TAG:-latest}
    build: ./ingester
    restart: always
    environment:
      - DATABASE_URL
      - HEALTHCHECK_VOTES_INGEST_URL
      - HEALTHCHECK_LEGISLATORS_INGEST_URL
      # Optional dead-man's-switch URL for the separate build-aggregates job.
      - HEALTHCHECK_VOTE_AGGREGATES_URL
      # Congress.gov API ingestion (bills). Without the key, the bills fetch
      # cron is a loud, clean skip. Target congress is the backfill-depth knob;
      # the request budget keeps each hourly run (list pages + per-bill
      # fan-out) under the api.data.gov rate limit (default 4000).
      - CONGRESS_GOV_API_KEY
      - CONGRESS_GOV_TARGET_CONGRESS
      - CONGRESS_GOV_HOURLY_REQUEST_BUDGET
      - HEALTHCHECK_BILLS_FETCH_URL
      - HEALTHCHECK_BILLS_INGEST_URL
      # Cap the V8 heap — the ingester is mostly idle so 64 MB is ample.
      - NODE_OPTIONS=--max-old-space-size=64
    volumes:
      - scraped-data:/congress
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M

  nginx:
    # Custom image with the Docusaurus site baked in (see nginx/Dockerfile), so
    # deploying docs is an atomic container swap — no on-box `npm run build` and
    # no separate nginx restart. nginx.conf and the TLS certs stay bind-mounted
    # so config/cert tweaks need no image rebuild.
    image: ghcr.io/govql/us-congress-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/govql/certs:/etc/letsencrypt:ro
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 32M

  server:
    image: ghcr.io/govql/us-congress-server:${IMAGE_TAG:-latest}
    build: ./postgraphile-server
    restart: always
    # Port 4000 is intentionally not exposed to the host — nginx proxies to it internally.
    environment:
      - DATABASE_URL
      - REDIS_URL
      - ENABLE_GRAPHIQL
      - LOG_LEVEL
      # Cap the V8 heap. PostGraphile v5 is lean; 128 MB handles normal load
      # and the complexity budget prevents runaway query allocations.
      - NODE_OPTIONS=--max-old-space-size=192
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for migrations to finish so PostGraphile introspects the new schema.
      flyway:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 224M

  vector:
    image: timberio/vector:latest-alpine
    restart: always
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOKI_ENDPOINT
      - LOKI_USERNAME
      - LOKI_API_KEY
    deploy:
      resources:
        limits:
          memory: 32M

  pdc-agent:
    image: grafana/pdc-agent:latest
    restart: always
    command:
      - -token
      - ${GCLOUD_PDC_SIGNING_TOKEN}
      - -cluster
      - ${GCLOUD_PDC_CLUSTER}
      - -gcloud-hosted-grafana-id
      - ${GCLOUD_HOSTED_GRAFANA_ID}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  scraped-data:
  postgres-data:
