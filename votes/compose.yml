services:
  scraper:
    build:
      context: .
      dockerfile: ./scraper/Dockerfile
    restart: always
    volumes:
      - scraped-data:/congress

  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingester:
    build: ./ingester
    restart: always
    environment:
      - DATABASE_URL
    volumes:
      - scraped-data:/congress
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: ./server2
    ports:
      - 4000:4000
    environment:
      - DATABASE_URL
      - REDIS_URL
      - ENABLE_GRAPHIQL
      - LOG_LEVEL
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  scraped-data:
  postgres-data:
