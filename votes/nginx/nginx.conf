# Wildcard cert covers both govql.us and *.govql.us (including api.govql.us).
# Obtain it with the Gandi DNS plugin before starting the stack:
#
#   sudo apt install python3-certbot-dns-gandi
#   sudo mkdir -p /root/.secrets/certbot
#   sudo tee /root/.secrets/certbot/gandi.ini <<EOF
#   dns_gandi_api_key = YOUR_GANDI_API_KEY
#   EOF
#   sudo chmod 600 /root/.secrets/certbot/gandi.ini
#
#   sudo certbot certonly \
#     --authenticator dns-gandi \
#     --dns-gandi-credentials /root/.secrets/certbot/gandi.ini \
#     -d govql.us -d '*.govql.us'
#
# Renewal (add to root crontab via sudo crontab -e):
#   0 3 * * * certbot renew \
#     --pre-hook "docker compose -f /opt/govql/votes/compose.yml stop nginx" \
#     --post-hook "docker compose -f /opt/govql/votes/compose.yml start nginx" \
#     --quiet

# Shared SSL settings — referenced by both HTTPS server blocks.
ssl_certificate     /etc/letsencrypt/live/govql.us/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/govql.us/privkey.pem;
ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;

# ── HTTP: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: static site (govql.us) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name govql.us;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Docusaurus generates static HTML for all routes, but this fallback
        # handles direct navigation to any path gracefully.
        try_files $uri $uri/ $uri.html /index.html;
    }
}

# ── HTTPS: GraphQL API (api.govql.us) ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.govql.us;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://server:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # GraphQL requests can take a moment on complex queries.
        proxy_read_timeout 30s;
    }
}
