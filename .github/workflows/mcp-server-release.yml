name: mcp-server-release

# Publishes govql-mcp-server when a release tag is pushed, replacing the
# manual `uv publish` runbook. The tag is the single source of truth: a
# guardrail fails the run if the tagged commit's pyproject.toml or
# CHANGELOG.md disagrees with the tagged version, and the version's shape
# picks the destination — a final X.Y.Z publishes to PyPI and creates the
# GitHub Release; an X.Y.ZrcN tag is a TestPyPI rehearsal (sandbox upload,
# no Release), so rehearsing needs no workflow edits and nothing can leak
# into a real release (#95). Publishing waits at a GitHub Environment's
# required-reviewer approval either way — the same one-click gate pattern
# as the us-congress production deploy. Runbook: mcp-server/RELEASE.md.
on:
  push:
    tags:
      - 'govql-mcp-server-v*'

# Least privilege: building needs only repo read. The publish job escalates
# per-job (OIDC token for PyPI, contents write for the GitHub Release).
permissions:
  contents: read

jobs:
  # Build the sdist + wheel once and hand them to publish as an artifact, so
  # what gets approved at the gate is byte-for-byte what was built here —
  # nothing is rebuilt after approval.
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v5

      # The release invariant: tag, pyproject.toml, and CHANGELOG must agree.
      - name: Verify tag matches pyproject.toml and CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#govql-mcp-server-v}"
          PYPROJECT_VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag says ${TAG_VERSION} but pyproject.toml says ${PYPROJECT_VERSION} — bump pyproject.toml (and CHANGELOG.md), merge, then re-tag"
            exit 1
          fi
          if ! grep -qF "## [${TAG_VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for ${TAG_VERSION} — every release documents itself"
            exit 1
          fi

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: mcp-server/dist/
          if-no-files-found: error
          # An approval can arrive up to 30 days after the tag push; the
          # artifact must outlive the wait at the gate.
          retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The manual gate: `pypi` and `testpypi` are GitHub Environments with a
    # required reviewer, so the run pauses here for a one-click approval
    # before anything is uploaded. The tag routes which one (and, below,
    # which index): an `rc` version is a rehearsal, a final version is a
    # release. The contains() check can only match the version segment — the
    # literal tag prefix `govql-mcp-server-v` contains no "rc" — and rc is
    # the only pre-release form this project tags (RELEASE.md §6).
    # The environment name is also part of the Trusted Publisher
    # registration on each index (pypi ↔ pypi.org, testpypi ↔ test.pypi.org),
    # and an upload from any other environment (or workflow, or repo) is
    # refused server-side — so even a mis-routed run couldn't cross the
    # streams: its OIDC identity wouldn't match the other index's publisher.
    environment:
      name: ${{ contains(github.ref_name, 'rc') && 'testpypi' || 'pypi' }}
      url: >-
        ${{ contains(github.ref_name, 'rc')
        && 'https://test.pypi.org/project/govql-mcp-server/'
        || 'https://pypi.org/project/govql-mcp-server/' }}
    permissions:
      # OIDC: lets this job mint the short-lived identity token that PyPI's
      # Trusted Publishing exchanges for a scoped upload token — no
      # long-lived API token stored in the repo.
      id-token: write
      # For creating the GitHub Release below.
      contents: write
    steps:
      # Checkout before downloading the artifact: checkout cleans the
      # workspace when it initializes, so dist/ would be wiped if fetched
      # first. The checkout itself is only for CHANGELOG.md (release notes).
      - uses: actions/checkout@v5

      # dist/ at the workspace root is the publish action's default
      # packages-dir; drop the built artifact straight into it.
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      # Trusted Publishing (OIDC): the action authenticates as this repo +
      # workflow + environment (as registered on the index), verifies the
      # package metadata, uploads, and generates PEP 740 attestations — all
      # by default. release/v1 is the action's maintained stable branch, its
      # documented pin (it publishes no major-version tag like the actions/*
      # family). The || arm is the action's own default URL, spelled out so
      # both routes are explicit rather than one hiding behind a default.
      - name: Publish (PyPI, or TestPyPI for rc tags)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: >-
            ${{ contains(github.ref_name, 'rc')
            && 'https://test.pypi.org/legacy/'
            || 'https://upload.pypi.org/legacy/' }}

      # The GitHub Release mirrors PyPI — created only for final versions,
      # after the upload succeeds, with the version's CHANGELOG section as
      # the notes and the published files attached for the audit trail.
      # rc tags skip it: a rehearsal must not put anything on the repo's
      # public Releases page (the first rehearsal's Release got badged
      # "Latest" — #95).
      - name: Create GitHub Release
        if: ${{ !contains(github.ref_name, 'rc') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#govql-mcp-server-v}"
          awk -v heading="## [${VERSION}]" '
            index($0, heading) == 1 { found = 1; next }
            /^## \[/ { found = 0 }
            found
          ' mcp-server/CHANGELOG.md > notes.md
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "govql-mcp-server v${VERSION}" \
            --notes-file notes.md
